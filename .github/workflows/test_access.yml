name: Test Hotline Access

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install curl_cffi
        run: pip install curl_cffi -q

      - name: Test access to hotline.ua
        run: python test_access.py
